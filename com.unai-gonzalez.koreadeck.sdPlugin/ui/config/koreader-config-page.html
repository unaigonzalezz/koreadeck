<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>KOReadeck - Configuration</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="/styles/fonts.css" />
    <link rel="shortcut icon" href="/img/favicon.ico" />
  </head>

  <body class="w-screen h-screen bg-teal-600 text-slate-900 overflow-hidden">
    <div class="w-full h-full flex flex-col">
      <div id="wizardSection" class="flex-1 grid grid-cols-1 md:grid-cols-2">
        <div class="flex flex-col justify-center px-10 md:px-16 bg-white">
          <img src="/img/koreadeck-logo.png" alt="KOReadeck Logo" class="w-72 mb-6" />

          <div class="mb-6 text-sm text-slate-500 flex justify-between">
            <span
              id="wizardTitle"
            ></span>
            <span id="wizardCounter"></span>
          </div>

          <p id="wizardText" class="font-exclusive text-3xl md:text-4xl font-semibold text-teal-600 leading-tight mb-10"></p>

          <div class="flex justify-between items-center">
            <button
              id="skipWizard"
              class="px-6 py-2 rounded-xl border border-slate-300 text-slate-700 disabled:opacity-40"
            >
              Skip wizard
            </button>

            <button
              id="wizardPrev"
              class="px-6 py-2 rounded-xl border border-slate-300 text-slate-700 disabled:opacity-40"
            >
              Back
            </button>

            <div class="flex gap-3">
              <button id="wizardNext" class="px-6 py-2 rounded-xl bg-teal-600 text-white font-semibold">Next</button>

              <button id="wizardFinish" class="px-6 py-2 rounded-xl bg-teal-700 text-white font-semibold hidden">
                Configure
              </button>
            </div>
          </div>
        </div>

        <div class="flex items-center justify-center bg-teal-700 p-10">
          <img
            id="wizardImage"
            class="max-w-[85%] max-h-[85%] rounded-2xl shadow-2xl object-contain bg-black/10"
            alt="Step image"
          />
        </div>
      </div>

      <form id="configForm" class="hidden flex-1 bg-white flex flex-col justify-center px-10 md:px-32">
        <h1 class="text-3xl font-semibold mb-2">Configure <img src="/img/koreadeck-logo.png" alt="KOReadeck Logo" class="h-14 inline-block ml-2" /></h1>
        <p class="text-slate-500 mb-8">Define the IP address and global parameters, both devices must be on the same local network to connect.</p>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
          <div>
            <label class="block text-sm mb-1">KoReader IP:</label>
            <input
              id="ip"
              class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:outline-none focus:ring-2 focus:ring-teal-500"
              placeholder="192.168.1.10"
              required
            />
          </div>

          <div>
            <label class="block text-sm mb-1">Port:</label>
            <input
              id="port"
              type="number"
              class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:outline-none focus:ring-2 focus:ring-teal-500"
              placeholder="8080"
            />
          </div>

          <div>
            <label class="block text-sm mb-1">Timeout (ms):</label>
            <input
              id="timeoutMs"
              type="number"
              class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:outline-none focus:ring-2 focus:ring-teal-500"
              placeholder="3000"
            />
          </div>
        </div>

        <div class="flex items-center gap-4">
          <button type="submit" class="px-8 py-3 rounded-xl bg-teal-600 text-white font-semibold">Save</button>
          <span id="status" class="text-sm"></span>
        </div>
      </form>
    </div>

    <script src="./const/steps.js"></script>
    <script>
      const steps = Array.isArray(window.KOREADER_WIZARD_STEPS) ? window.KOREADER_WIZARD_STEPS : [];
      let currentStepIndex = 0;

      const wizardSectionEl = document.getElementById("wizardSection");
      const formSectionEl = document.getElementById("configForm");
      const wizardTitleEl = document.getElementById("wizardTitle");
      const wizardTextEl = document.getElementById("wizardText");
      const wizardImageEl = document.getElementById("wizardImage");
      const wizardCounterEl = document.getElementById("wizardCounter");
      const skipWizardEl = document.getElementById("skipWizard");
      const wizardPrevEl = document.getElementById("wizardPrev");
      const wizardNextEl = document.getElementById("wizardNext");
      const wizardFinishEl = document.getElementById("wizardFinish");

      const statusEl = document.getElementById("status");
      const ipEl = document.getElementById("ip");
      const portEl = document.getElementById("port");
      const timeoutEl = document.getElementById("timeoutMs");
      const formEl = document.getElementById("configForm");

      const setStatus = (message, type) => {
        statusEl.textContent = message;
        statusEl.className =
          "text-sm " + (type === "ok" ? "text-teal-600" : type === "error" ? "text-red-600" : "text-slate-500");
      };

      const loadSettings = async () => {
        try {
          const response = await fetch("/settings");
          const data = await response.json();
          if (data.ok) {
            ipEl.value = data.settings.ip ?? "";
            portEl.value = data.settings.port ?? "";
            timeoutEl.value = data.settings.timeoutMs ?? "";
          }
        } catch {
          setStatus("Could not load settings.", "error");
        }
      };

      const renderWizardStep = () => {
        if (!steps.length) {
          wizardSectionEl.classList.add("hidden");
          formSectionEl.classList.remove("hidden");
          return;
        }

        const step = steps[currentStepIndex];
        wizardTitleEl.textContent = step?.title ?? "";
        wizardTextEl.textContent = step?.text ?? "";
        wizardImageEl.src = step?.image ?? "";
        wizardCounterEl.textContent = `Step ${currentStepIndex + 1} of ${steps.length}`;

        skipWizardEl.hidden = currentStepIndex >= 1;
        wizardPrevEl.hidden = currentStepIndex === 0;
        const isLast = currentStepIndex === steps.length - 1;
        wizardNextEl.classList.toggle("hidden", isLast);
        wizardFinishEl.classList.toggle("hidden", !isLast);
      };

      skipWizardEl.onclick = () => {
        wizardSectionEl.classList.add("hidden");
        formSectionEl.classList.remove("hidden");
      };

      wizardPrevEl.onclick = () => {
        if (currentStepIndex > 0) {
          currentStepIndex--;
          renderWizardStep();
        }
      };

      wizardNextEl.onclick = () => {
        if (currentStepIndex < steps.length - 1) {
          currentStepIndex++;
          renderWizardStep();
        }
      };

      wizardFinishEl.onclick = () => {
        wizardSectionEl.classList.add("hidden");
        formSectionEl.classList.remove("hidden");
      };

      formEl.onsubmit = async (e) => {
        e.preventDefault();
        setStatus("Saving...");

        try {
          const response = await fetch("/settings", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              ip: ipEl.value.trim(),
              port: portEl.value,
              timeoutMs: timeoutEl.value,
            }),
          });

          const data = await response.json();
          if (data.ok) {
            setStatus("Testing connection...");
            const testUrl = `http://${ipEl.value.trim()}:${portEl.value || 8080}`;
            const timeoutMs = parseInt(timeoutEl.value) || 3000;

            try {
              const controller = new AbortController();
              const timeout = setTimeout(() => controller.abort(), timeoutMs);

              await fetch(testUrl, {
                signal: controller.signal,
                mode: "no-cors",
              });

              clearTimeout(timeout);
              window.location.href = "config/success";
            } catch {
              setStatus("Error: Could not connect to KoReader at " + testUrl, "error");
            }
          }
        } catch {
          setStatus("Error while saving.", "error");
        }
      };

      renderWizardStep();
      loadSettings();
    </script>
  </body>
</html>
