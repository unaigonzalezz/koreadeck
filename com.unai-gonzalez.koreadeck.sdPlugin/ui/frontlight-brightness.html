<!doctype html>
<html>
  <head lang="es">
    <title>KoReader Frontlight Brightness</title>
    <meta charset="utf-8" />
    <script src="shared/sdpi-components.js"></script>
  </head>

  <body>
    <sdpi-item label="Action">
      <sdpi-select setting="mode" default="up">
        <option value="up">+1 bright</option>
        <option value="down">-1 bright</option>
        <option value="custom">Custom bright</option>
      </sdpi-select>
    </sdpi-item>

    <sdpi-item label="Personalized value" sdpi-show="mode === 'custom'">
      <sdpi-textfield setting="customDelta" min="-24" max="24" step="0.5"> </sdpi-textfield>
    </sdpi-item>
    <sdpi-item label="Support">
      <div style="display: flex; flex-direction: column; gap: 10px">
        <div style="display: flex; flex-direction: row; gap: 8px">
          <a
            style="cursor: pointer"
            onclick="SDPIComponents.streamDeckClient.send('openUrl', { url: 'https://ko-fi.com/X8X4LBFTT' })"
            target="_blank"
            rel="noopener noreferrer"
          >
            <img height="30" style="border: 0; height: 30px" src="./img/kofi.png" alt="Buy me a coffee on Ko-fi" />
          </a>

          <a
            style="cursor: pointer"
            onclick="
              SDPIComponents.streamDeckClient.send('openUrl', { url: 'https://github.com/unaigonzalezz/koreadeck' })
            "
            target="_blank"
            rel="noopener noreferrer"
          >
            <img height="30" style="border: 0; height: 30px" src="./img/star.png" alt="Star this project on GitHub" />
          </a>
        </div>

        <p style="margin: 0; font-size: 12px; line-height: 1.4; color: var(--sdpi-color)">
          If you enjoy this project, you can support its development by buying me a coffee ☕ or starring the project on
          GitHub ⭐.
        </p>

        <p style="margin: 0; font-size: 12px; line-height: 1.4; color: var(--sdpi-color)">
          Every coffee and every star helps me continue improving the plugin, adding new features, and maintaining
          future updates.
        </p>
      </div>
    </sdpi-item>
  </body>
</html>
